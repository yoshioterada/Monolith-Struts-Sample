# Test profile - H2 in-memory with PostgreSQL compatibility mode
spring.datasource.url=jdbc:h2:mem:skishop_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# DDL auto-create from entity definitions
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests (schema auto-created by Hibernate)
spring.flyway.enabled=false

# Mail (disabled in tests)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# Logging - reduce noise in tests
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
