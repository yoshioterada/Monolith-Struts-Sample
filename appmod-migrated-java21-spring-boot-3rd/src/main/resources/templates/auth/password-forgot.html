<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="ja">
<head>
  <title>パスワード再発行</title>
</head>
<body>
<div layout:fragment="content">
  <h2 class="page-title">パスワード再発行</h2>
  <div class="card">
    <form th:action="@{/auth/password/forgot}" th:object="${forgotRequest}" method="post">
      <table>
        <tr>
          <th><label for="email" th:text="#{label.email}">Email</label></th>
          <td>
            <input id="email" type="email" th:field="*{email}" required size="40">
            <span th:errors="*{email}" style="color:red;"></span>
          </td>
        </tr>
      </table>
      <button type="submit">送信</button>
    </form>
    <p><a th:href="@{/auth/login}">ログインへ戻る</a></p>
  </div>
</div>
</body>
</html>
