<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}"
      lang="ja">
<head>
  <title>クーポン管理</title>
</head>
<body>
<div layout:fragment="content">
  <h2 class="page-title">クーポン管理</h2>
  <p><a th:href="@{/admin/coupons/new}" class="btn">クーポンを追加</a></p>
  <p th:if="${coupons == null or coupons.isEmpty()}">クーポンがありません。</p>
  <div th:unless="${coupons == null or coupons.isEmpty()}" class="card table-responsive">
    <table>
      <thead>
        <tr>
          <th th:text="#{label.couponCode}">Code</th>
          <th th:text="#{label.couponType}">Type</th>
          <th th:text="#{label.discountValue}">Discount</th>
          <th th:text="#{label.usageLimit}">Limit</th>
          <th th:text="#{label.couponActive}">Active</th>
          <th>編集</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="coupon : ${coupons}">
          <td th:text="${coupon.code}"></td>
          <td th:text="${coupon.couponType}"></td>
          <td th:text="${coupon.discountValue}"></td>
          <td th:text="${coupon.usageLimit}"></td>
          <td th:text="${coupon.active}"></td>
          <td><a th:href="@{/admin/coupons/{code}/edit(code=${coupon.code})}">編集</a></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
