<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<body>
<div th:fragment="messages">
  <div th:if="${successMessage}" class="messages msg-success">
    <span th:text="${successMessage}"></span>
  </div>
  <div th:if="${errorMessage}" class="messages msg-error">
    <span th:text="${errorMessage}"></span>
  </div>
  <div th:if="${infoMessage}" class="messages">
    <span th:text="${infoMessage}"></span>
  </div>
</div>
</body>
</html>
