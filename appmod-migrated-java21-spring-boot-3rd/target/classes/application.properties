# SkiShop Application - Common Settings
spring.application.name=skishop-app

# Error handling
server.error.include-stacktrace=never
server.error.include-message=never

# JPA
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Logging
logging.level.root=WARN
logging.level.com.skishop=INFO

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Session Configuration (H-2)
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# Request Body Size Limits (H-5)
server.tomcat.max-http-form-post-size=2MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# SMTP Timeouts (C-4)
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Graceful Shutdown (C-5)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Suppress Server Header (H-7)
server.server-header=

# Scheduler thread pool (H-20)
spring.task.scheduling.pool.size=4
spring.task.scheduling.shutdown.await-termination=true
spring.task.scheduling.shutdown.await-termination-period=30s

# HiddenHttpMethodFilter for PUT/DELETE from HTML forms (H-29)
spring.mvc.hiddenmethod.filter.enabled=true

# Virtual Threads (H-34)
spring.threads.virtual.enabled=true
