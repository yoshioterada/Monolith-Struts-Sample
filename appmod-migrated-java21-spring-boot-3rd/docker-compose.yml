version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: skishop-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skishop}
      POSTGRES_USER: ${POSTGRES_USER:-skishop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skishop"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: skishop-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-skishop}
      DB_USERNAME: ${POSTGRES_USER:-skishop}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: skishop-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
